<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>G550 Trim Calculator</title>
<style>
body{
font-family:Arial;
background:#0b1f3a;
color:white;
text-align:center;
padding:20px;
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}

h1{
font-size:32px;
margin-bottom:30px;
font-weight:normal;
}

.card{
background:#132f54;
padding:25px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

label{
display:block;
text-align:left;
font-size:18px;
margin-bottom:5px;
color:#aaccff;
}

input{
width:100%;
padding:15px;
font-size:22px;
margin-top:5px;
margin-bottom:25px;
border-radius:8px;
border:none;
text-align:center;
box-sizing:border-box;
background:#1e3a5f;
color:white;
outline:2px solid transparent;
}

input:focus{
outline:2px solid #ffb400;
}

input::placeholder{
color:#6b8fb0;
}

button{
width:100%;
padding:18px;
font-size:22px;
background:#ffb400;
border:none;
border-radius:10px;
font-weight:bold;
color:#0b1f3a;
cursor:pointer;
transition:background 0.2s;
margin-top:10px;
}

button:hover{
background:#ffc42b;
}

#result{
font-size:48px;
margin-top:30px;
color:#ffcc33;
font-weight:bold;
padding:10px;
background:#1e3a5f;
border-radius:10px;
border:2px solid #ffb400;
min-height:70px;
display:flex;
align-items:center;
justify-content:center;
}

.small-note{
font-size:14px;
color:#aaccff;
margin-top:15px;
text-align:left;
}

</style>
</head>

<body>

<h1>G550 TRIM CALCULATOR</h1>

<div class="card">
<div style="text-align:left; margin-bottom:5px; font-size:18px; color:#aaccff;">FUEL LOADED (LBS)</div>
<input id="fuel" type="number" placeholder="e.g. 27500">

<div style="text-align:left; margin-bottom:5px; font-size:18px; color:#aaccff;">CG AT ZFM (%)</div>
<input id="cg" type="number" step="0.1" placeholder="e.g. 36.5">

<button onclick="calculate()">CALCULATE TRIM</button>

<div id="result">---</div>

<div class="small-note">
• Fuel range: 0 - 41,300 lbs<br>
• CG range: 34.5% - 45%
</div>

</div>

<script>
// table.js content
const fuelArray = [
    0,2000,4000,6000,8000,10000,12000,14000,16000,18000,
    20000,22000,24000,26000,28000,30000,32000,34000,36000,
    38000,40000,41300
]
    
const cgArray = [
    34.5,35,37,39,41,43,45
]
    
const valuesArray = [
    [11,11,10,10,9,8.5,8],
    [11,11,10,10,9,8.5,8],
    [11,11,10,10,9,8.5,8],
    [11,11,10,10,9,8.5,8],
    [11,11,10,10,9,8.5,8],
    [11,11,10,10,9,8.5,8],
    [11,11,10,10,9,8.5,8],
    [11,11,10,10,9,8.5,8],
    [11,11,10,10,9,8.5,8],
    [11,11,10,10,9,8.5,8],
    [12,11,11,11,10,9,8],
    [13,12,12,12,11,9,8.5],
    [14,13,13,12,11,9,8.5],
    [15,14,14,12,11,10,9],
    [15,15,14,12,11,10,9.5],
    [15,15,14,12,12,11,10],
    [16,15,15,13,12,11,10.5],
    [16,16,15,14,13,12,11],
    [17,17,16,14,14,13,11.5],
    [18,17,17,15,14,14,12],
    [18,18,18,16,15,15,13],
    [18.5,18.5,18,17,16,15,13]
]

// script.js content
function calculate() {
    let fuel = parseFloat(document.getElementById("fuel").value)
    let cg = parseFloat(document.getElementById("cg").value)
    let resultElement = document.getElementById("result")

    if (isNaN(fuel) || isNaN(cg)) {
        resultElement.innerText = "ENTER VALUES"
        return
    }

    // encontrar fila más cercana (fuel)
    let row = -1;
    for (let i = 0; i < fuelArray.length; i++) {
        if (fuel <= fuelArray[i]) {
            row = i;
            break;
        }
    }

    if (row === -1) {
        resultElement.innerText = "FUEL OUT OF RANGE"
        return
    }

    // encontrar columna más cercana (cg)
    let col = -1;
    for (let i = 0; i < cgArray.length; i++) {
        if (cg <= cgArray[i]) {
            col = i;
            break;
        }
    }

    if (col === -1) {
        resultElement.innerText = "CG OUT OF RANGE"
        return
    }

    // obtener el valor de la tabla
    let result = valuesArray[row][col]
    resultElement.innerText = result
}
</script>

</body>
</html>
